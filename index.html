<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .game-board {
            width: min(640px, 100%);
            background: #1e1e2a;
            border: 2px solid #5c6cff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            color: #9ab4ff;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .panel {
            background: #161623;
            border: 1px solid #3a3d58;
            border-radius: 12px;
            padding: 16px;
        }
        .panel h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #c7d0ff;
        }
        .panel p {
            margin: 8px 0;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.15s ease;
        }
        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #attack-btn { background: #ff6b6b; color: #111; }
        #heal-btn { background: #4ade80; color: #111; }
        #flee-btn { background: #facc15; color: #111; }
        #new-game-btn { background: #5c6cff; color: #fff; width: 100%; }
        #log {
            background: #0f1020;
            border: 1px solid #2b2f4a;
            border-radius: 12px;
            padding: 16px;
            min-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .log-line {
            margin: 0 0 8px;
        }
    </style>
</head>
<body>
    <section class="game-board">
        <h1>Avventura RPG</h1>
        <div class="stats">
            <section class="panel" id="player-panel">
                <h2>Eroe</h2>
                <p id="player-name">Nome: —</p>
                <p id="player-health">Vita: —</p>
                <p id="player-attack">Attacco: —</p>
                <p id="player-defense">Difesa: —</p>
                <p id="player-heals">Cure: —</p>
            </section>
            <section class="panel" id="monster-panel">
                <h2>Mostro</h2>
                <p id="monster-name">Nome: —</p>
                <p id="monster-health">Vita: —</p>
                <p id="monster-attack">Attacco: —</p>
                <p id="monster-defense">Difesa: —</p>
                <p id="monster-escape">Probabilità fuga: —</p>
            </section>
        </div>
        <div class="actions">
            <button id="attack-btn">Attacca</button>
            <button id="heal-btn">Cura</button>
            <button id="flee-btn">Fuggi</button>
        </div>
        <button id="new-game-btn">Nuova Battaglia</button>
        <div id="log"></div>
        <footer style="margin-top: 20px; text-align: center; color: #a0a8ff; font-size: 0.9rem;">
            made by <a href="https://github.com/StrikeAspect" target="_blank" rel="noopener noreferrer" style="color: #c7d0ff; text-decoration: none;">@RF-Creator</a>
        </footer>
    </section>
    <script src="rpg.js"></script>
</body>
</html>
